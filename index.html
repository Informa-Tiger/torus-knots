<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K(q,r) Torus Link</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap');
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  :root {
    --bg:#09090f; --surf:#0f0f18; --border:#1e1e30;
    --acc:#7c6aff; --text:#dde0f0; --muted:#4a4a6a;
    --sidebar-w: 250px;
    --header-h: 44px;
  }
  body.light {
    --bg:#f0f0f8; --surf:#ffffff; --border:#d0d0e8;
    --acc:#5548cc; --text:#1a1a2e; --muted:#8888aa;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Space Mono', monospace; overflow: hidden;
    transition: background .25s, color .25s;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex; flex-direction: column; height: 100vh;
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h); flex-shrink: 0;
    padding: 0 12px; border-bottom: 1px solid var(--border);
    background: var(--surf); display: flex; align-items: center; gap: 10px;
    z-index: 100; transition: background .25s;
  }
  .menu-btn {
    width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; color: var(--text); cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: border-color .17s;
  }
  .menu-btn:hover { border-color: var(--acc); color: var(--acc); }
  header h1 {
    font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 300;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .hint { font-size: 0.5rem; color: var(--muted); white-space: nowrap; }
  @media (max-width: 500px) { .hint { display: none; } }

  .theme-btn {
    width: 34px; height: 19px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--border); cursor: pointer; position: relative; transition: background .25s;
    flex-shrink: 0;
  }
  .theme-btn::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 13px; height: 13px; border-radius: 50%;
    background: var(--acc); transition: transform .22s;
  }
  body.light .theme-btn::after { transform: translateX(15px); }
  .theme-icon { font-size: 0.7rem; color: var(--muted); user-select: none; }

  /* ── BODY ROW ── */
  #body-row {
    flex: 1; display: flex; overflow: hidden; position: relative;
  }

  /* ── SIDEBAR ── */
  aside {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--surf); border-right: 1px solid var(--border);
    padding: 14px 12px; display: flex; flex-direction: column; gap: 13px;
    overflow-y: auto; overflow-x: hidden;
    transition: transform .28s cubic-bezier(.4,0,.2,1), background .25s;
    z-index: 50;
  }
  /* On mobile, sidebar slides in/out as overlay */
  @media (max-width: 700px) {
    aside {
      position: absolute; top: 0; left: 0; bottom: 0;
      box-shadow: 4px 0 24px rgba(0,0,0,.5);
      transform: translateX(-100%);
    }
    aside.open { transform: translateX(0); }
    #overlay {
      display: none; position: absolute; inset: 0; background: rgba(0,0,0,.45);
      z-index: 40;
    }
    #overlay.show { display: block; }
  }
  /* On desktop, sidebar is always visible but can be collapsed */
  @media (min-width: 701px) {
    aside { transform: translateX(0) !important; }
    aside.collapsed {
      width: 0; padding: 0; border: none; overflow: hidden;
      transform: translateX(0) !important;
    }
    #overlay { display: none !important; }
  }

  /* ── SIDEBAR CONTENTS ── */
  .sec { font-size: 0.48rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .div { height: 1px; background: var(--border); flex-shrink: 0; }

  .pr { display: flex; flex-direction: column; gap: 4px; }
  .pl { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text); }
  .pl .v { color: var(--acc); font-weight: 700; font-size: 0.78rem; }
  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 2px;
    background: var(--border); outline: none; border-radius: 2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--acc); cursor: pointer; box-shadow: 0 0 6px var(--acc);
  }

  .vg { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .vb {
    padding: 7px 3px; font-family: 'Space Mono', monospace; font-size: 0.52rem;
    letter-spacing: 0.05em; text-transform: uppercase; background: transparent;
    border: 1px solid var(--border); color: var(--muted); cursor: pointer;
    transition: all .17s; border-radius: 2px;
  }
  .vb.on { border-color: var(--acc); color: var(--acc); background: rgba(124,106,255,.09); }
  body.light .vb.on { background: rgba(85,72,204,.09); }
  .vb:hover:not(.on) { border-color: var(--muted); color: var(--text); }

  .cg { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; }
  .cs { display: flex; flex-direction: column; gap: 3px; font-size: 0.5rem; color: var(--muted); align-items: center; }
  .cs input[type=color] { width: 100%; height: 22px; border: 1px solid var(--border); background: transparent; cursor: pointer; border-radius: 2px; padding: 1px; }

  .chks { display: flex; flex-direction: column; gap: 6px; }
  .chk { display: flex; align-items: center; gap: 7px; font-size: 0.6rem; color: var(--muted); cursor: pointer; }
  .chk:hover { color: var(--text); }
  .chk input { accent-color: var(--acc); width: 14px; height: 14px; }

  .ib { background: rgba(124,106,255,.05); border: 1px solid rgba(124,106,255,.17); border-radius: 3px; padding: 8px; font-size: 0.57rem; line-height: 1.95; }
  body.light .ib { background: rgba(85,72,204,.05); border-color: rgba(85,72,204,.2); }
  .kv { display: flex; justify-content: space-between; color: var(--muted); }
  .kv span:last-child { color: var(--text); font-weight: 700; }

  .sr { display: flex; align-items: center; gap: 7px; }
  .pb { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; transition: all .17s; }
  .pb:hover { border-color: var(--acc); color: var(--acc); }
  .sv2 { font-size: 0.56rem; color: var(--muted); width: 28px; text-align: right; }

  /* ── NUMBER INPUTS ── */
  .num-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 4px;
  }
  .num-field {
    display: flex; flex-direction: column; gap: 3px;
  }
  .num-field label {
    font-size: 0.46rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }
  .num-field input[type=number] {
    width: 100%; background: transparent; border: 1px solid var(--border);
    color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.75rem;
    font-weight: 700; padding: 5px 7px; border-radius: 2px; outline: none;
    text-align: center; transition: border-color .17s;
    -moz-appearance: textfield;
  }
  .num-field input[type=number]::-webkit-inner-spin-button,
  .num-field input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .num-field input[type=number]:focus { border-color: var(--acc); }
  .num-field input[type=number].invalid { border-color: #ff4466; color: #ff4466; }

  /* ── CANVAS AREA ── */
  main {
    flex: 1; position: relative; overflow: hidden; min-width: 0;
    touch-action: none; /* prevent browser scroll/zoom interfering with gestures */
  }
  canvas { display: block; width: 100% !important; height: 100% !important; }

  .vl {
    position: absolute; top: 12px; left: 12px; font-size: 0.52rem;
    letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted);
    background: rgba(9,9,15,.82); padding: 3px 7px; border-radius: 2px;
    pointer-events: none; transition: background .25s;
  }
  body.light .vl { background: rgba(240,240,248,.85); }
  .dh {
    position: absolute; bottom: 12px; right: 12px; font-size: 0.49rem;
    color: var(--muted); pointer-events: none; opacity: 0.5; text-align: right;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    <h1>K(q, r) Torus Link</h1>
    <div class="header-right">
      <span class="hint">drag · pinch · scroll</span>
      <span class="theme-icon" id="themeIcon">🌙</span>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()"></button>
    </div>
  </header>

  <div id="body-row">
    <div id="overlay" onclick="closeSidebar()"></div>

    <aside id="sidebar">
      <div>
        <div class="sec">Parameters</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div class="pr">
            <div class="pl"><span>q &nbsp;(meridional winds)</span><span class="v" id="qVal">3</span></div>
            <input type="range" id="qSl" min="-10" max="10" step="1" value="3">
          </div>
          <div class="pr">
            <div class="pl"><span>r &nbsp;(strands = longitudinal winds)</span><span class="v" id="rVal">2</span></div>
            <input type="range" id="rSl" min="1" max="12" step="1" value="2">
          </div>
          <div class="num-row">
            <div class="num-field">
              <label>q (meridional, any int)</label>
              <input type="number" id="qNum" value="3" step="1">
            </div>
            <div class="num-field">
              <label>r (longitudinal, ≥ 1)</label>
              <input type="number" id="rNum" value="2" step="1" min="1">
            </div>
          </div>
        </div>
      </div>
      <div class="div"></div>
      <div>
        <div class="sec">View</div>
        <div class="vg">
          <button class="vb" id="vBoth"  onclick="setView('both')">Both</button>
          <button class="vb on" id="vTorus" onclick="setView('torus')">Torus</button>
          <button class="vb" id="vCyl"   onclick="setView('cyl')">Cylinder</button>
          <button class="vb" id="vLink"  onclick="setView('link')">Link only</button>
        </div>
      </div>
      <div class="div"></div>
      <div>
        <div class="sec">Component Colors</div>
        <div class="cg" id="colorGrid"></div>
      </div>
      <div class="div"></div>
      <div>
        <div class="sec">Display</div>
        <div class="chks">
          <label class="chk"><input type="checkbox" id="chkTube" checked> Tube rendering</label>
          <label class="chk"><input type="checkbox" id="chkGhost" checked> Ghost surface</label>
          <label class="chk"><input type="checkbox" id="chkDots" checked> Show A/B points</label>
        </div>
      </div>
      <div class="div"></div>
      <div>
        <div class="sec">Animation</div>
        <div class="sr">
          <button class="pb" id="playBtn" onclick="togglePlay()">⏸</button>
          <input type="range" id="speedSl" min="0" max="3" step="0.1" value="0.5" style="flex:1">
          <span class="sv2" id="spVal">0.5×</span>
        </div>
      </div>
      <div class="div"></div>
      <div>
        <div class="sec">Info</div>
        <div class="ib">
          <div class="kv"><span>gcd(|q|, r)</span><span id="iGcd">1</span></div>
          <div class="kv"><span>Components</span><span id="iComp">1</span></div>
          <div class="kv"><span>Type</span><span id="iType">Knot</span></div>
          <div class="kv"><span>Long. winds (r)</span><span id="iLong">2</span></div>
          <div class="kv"><span>Merid. winds (|q|)</span><span id="iMerid">3</span></div>
          <div class="kv"><span>Min crossings</span><span id="iCross">2</span></div>
        </div>
      </div>
    </aside>

    <main id="wrap">
      <div class="vl" id="vlabel">TORUS VIEW</div>
      <canvas id="c"></canvas>
      <div class="dh" id="dragHint">drag · pinch to zoom<br>2-finger pan</div>
    </main>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── sidebar ──────────────────────────────────────────────────
const sidebar  = document.getElementById('sidebar');
const overlay  = document.getElementById('overlay');
const isMobile = () => window.innerWidth <= 700;
let sidebarOpen = false; // mobile state
let sidebarCollapsed = false; // desktop state

function toggleSidebar() {
  if (isMobile()) {
    sidebarOpen = !sidebarOpen;
    sidebar.classList.toggle('open', sidebarOpen);
    overlay.classList.toggle('show', sidebarOpen);
  } else {
    sidebarCollapsed = !sidebarCollapsed;
    sidebar.classList.toggle('collapsed', sidebarCollapsed);
    setTimeout(resize, 300);
  }
}
function closeSidebar() {
  sidebarOpen = false;
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}
// Close sidebar on mobile when view button clicked
function afterViewChange() { if (isMobile()) closeSidebar(); }

// ─── theme ────────────────────────────────────────────────────
let isLight = false;
function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  document.getElementById('themeIcon').textContent = isLight ? '☀️' : '🌙';
  renderer.setClearColor(isLight ? 0xf0f0f8 : 0x09090f, 1);
  rebuildScene(); applyView();
}

// ─── state ────────────────────────────────────────────────────
let Q=3, R=2, view='torus', playing=true, speed=0.5;
let useTube=true, useGhost=true, useDots=true;

const PALETTE=['#ff6a7c','#7c6aff','#4dffb8','#ffd46a',
               '#6ac8ff','#ff9e6a','#d46aff','#6affd4',
               '#ff6ac8','#c8ff6a','#6a8fff','#ffb86a'];
let compColors=[...PALETTE];

// ─── three.js ─────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x09090f, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(48, 1, 0.01, 200);
camera.position.set(0, 0, 8);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dL1 = new THREE.DirectionalLight(0xccccff, 1.0); dL1.position.set(5,8,6); scene.add(dL1);
const dL2 = new THREE.DirectionalLight(0xffaa88, 0.5); dL2.position.set(-5,-4,-4); scene.add(dL2);
const ptL = new THREE.PointLight(0x8877ff, 0.7, 50); ptL.position.set(0,4,4); scene.add(ptL);

const torusGrp = new THREE.Group();
const cylGrp   = new THREE.Group();
scene.add(torusGrp); scene.add(cylGrp);

// ─── constants ────────────────────────────────────────────────
const CYL_R=1.0, CYL_H=3.5, TOR_R=2.0, TOR_r=0.56, NPTS=300, TUBE_R=0.055;
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;}

// ─── geometry ─────────────────────────────────────────────────
function strandCylPoints(k,q,r){
  const pts=[];
  for(let i=0;i<=NPTS;i++){
    const t=i/NPTS;
    const phi=2*Math.PI*(k/r + q*t/r);
    pts.push(new THREE.Vector3(CYL_R*Math.cos(phi), CYL_R*Math.sin(phi), -CYL_H/2+CYL_H*t));
  }
  return pts;
}
function strandTorPoints(k,q,r){
  // Cylinder → torus mapping:
  //   z (height, bottom→top) = LONGITUDE direction  → phi = 2π·t
  //   angular position on cylinder = MERIDIAN direction → theta = 2π(k + q·t)/r
  //
  // Each strand contributes 1 longitudinal wind (phi: 0→2π)
  // and q/r meridional sweep (theta sweeps 2πq/r).
  // r strands total → r longitudinal winds, q meridional winds.
  // This is Murasugi K(q,r): q = meridional, r = longitudinal = # strands.
  const pts=[];
  for(let i=0;i<=NPTS;i++){
    const t=i/NPTS;
    const phi  = 2*Math.PI*t;                     // longitude: height direction, 1 wind per strand
    const theta= 2*Math.PI*(k + q*t)/r;           // meridian:  angular sweep, q/r winds per strand
    pts.push(new THREE.Vector3(
      (TOR_R+TOR_r*Math.cos(theta))*Math.cos(phi),
      (TOR_R+TOR_r*Math.cos(theta))*Math.sin(phi),
      TOR_r*Math.sin(theta)
    ));
  }
  return pts;
}
function buildTorComponents(q,r,d){
  const steps=r/d, comps=[];
  for(let c=0;c<d;c++){
    const pts=[];
    for(let s=0;s<steps;s++){
      const k=((c+s*q)%r+r)%r;
      const sp=strandTorPoints(k,q,r);
      for(let j=0;j<sp.length-1;j++) pts.push(sp[j]);
    }
    pts.push(pts[0].clone());
    comps.push(pts);
  }
  return comps;
}

// ─── mesh helpers ─────────────────────────────────────────────
function makeTube(pts,rad,col,closed){
  if(pts.length<4) return null;
  const curve=new THREE.CatmullRomCurve3(pts,closed);
  const geo=new THREE.TubeGeometry(curve,Math.min(pts.length,500),rad,10,closed);
  return new THREE.Mesh(geo,new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.25,shininess:100}));
}
function makeLine(pts,col){
  return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:col,linewidth:2}));
}
function ghostSurfMat(op){
  return new THREE.MeshPhongMaterial({color:isLight?0x8888cc:0x2a2a55,emissive:isLight?0x4444aa:0x111133,transparent:true,opacity:op,side:THREE.DoubleSide,depthWrite:false});
}
function ghostWireMat(op){
  return new THREE.MeshBasicMaterial({color:isLight?0x6666cc:0x4444bb,wireframe:true,transparent:true,opacity:op});
}
const TAG_SURF='surf', TAG_WIRE='wire';
function tag(m,t){m.userData.ghostTag=t;return m;}

// ─── scene build ──────────────────────────────────────────────
function rebuildScene(){
  while(torusGrp.children.length) torusGrp.remove(torusGrp.children[0]);
  while(cylGrp.children.length)   cylGrp.remove(cylGrp.children[0]);

  const q=Q,r=R,d=gcd(Math.abs(q),r);
  const sOp=useGhost?(isLight?0.28:0.35):0;
  const wOp=useGhost?(isLight?0.22:0.20):0;

  // torus surface
  torusGrp.add(tag(new THREE.Mesh(new THREE.TorusGeometry(TOR_R,TOR_r,80,160),ghostSurfMat(sOp)),TAG_SURF));
  torusGrp.add(tag(new THREE.Mesh(new THREE.TorusGeometry(TOR_R,TOR_r,16,48),ghostWireMat(wOp)),TAG_WIRE));

  // cylinder surface — rotated so axis = Z
  function mkCylGeo(rs,hs,open){
    const g=new THREE.CylinderGeometry(CYL_R,CYL_R,CYL_H,rs,hs,open);
    g.applyMatrix4(new THREE.Matrix4().makeRotationX(Math.PI/2));
    return g;
  }
  cylGrp.add(tag(new THREE.Mesh(mkCylGeo(64,1,true),ghostSurfMat(sOp)),TAG_SURF));
  cylGrp.add(tag(new THREE.Mesh(mkCylGeo(32,8,true),ghostWireMat(wOp)),TAG_WIRE));
  const capGeo=new THREE.CircleGeometry(CYL_R,64);
  const cT=new THREE.Mesh(capGeo,ghostSurfMat(useGhost?(isLight?0.20:0.25):0));
  cT.position.z=CYL_H/2;
  const cB=new THREE.Mesh(capGeo.clone(),ghostSurfMat(useGhost?(isLight?0.20:0.25):0));
  cB.rotation.y=Math.PI; cB.position.z=-CYL_H/2;
  cylGrp.add(tag(cT,TAG_SURF)); cylGrp.add(tag(cB,TAG_SURF));

  // torus link
  const torComps=buildTorComponents(q,r,d);
  for(let c=0;c<d;c++){
    const col=new THREE.Color(compColors[c%PALETTE.length]);
    const m=useTube?makeTube(torComps[c],TUBE_R,col,true):makeLine(torComps[c],col);
    if(m) torusGrp.add(m);
  }
  // cylinder strands
  for(let k=0;k<r;k++){
    const col=new THREE.Color(compColors[(k%d)%PALETTE.length]);
    const pts=strandCylPoints(k,q,r);
    const m=useTube?makeTube(pts,TUBE_R,col,false):makeLine(pts,col);
    if(m) cylGrp.add(m);
  }
  // dots
  if(useDots){
    const dg=new THREE.SphereGeometry(0.07,14,14);
    for(let k=0;k<r;k++){
      const col=new THREE.Color(compColors[(k%d)%PALETTE.length]);
      const mat=()=>new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.7});
      const aA=2*Math.PI*k/r, bA=2*Math.PI*(k+q)/r;
      const dA=new THREE.Mesh(dg,mat()); dA.position.set(CYL_R*Math.cos(aA),CYL_R*Math.sin(aA),-CYL_H/2); cylGrp.add(dA);
      const dB=new THREE.Mesh(dg.clone(),mat()); dB.position.set(CYL_R*Math.cos(bA),CYL_R*Math.sin(bA),+CYL_H/2); cylGrp.add(dB);
      const td=new THREE.Mesh(new THREE.SphereGeometry(0.06,12,12),mat());
      // Dot at start of strand k on torus: phi=0 (longitude start), theta=2πk/r (meridional offset)
      const tTheta = 2*Math.PI*k/r;
      td.position.set((TOR_R+TOR_r*Math.cos(tTheta)), 0, TOR_r*Math.sin(tTheta));
      torusGrp.add(td);
    }
  }

  document.getElementById('iGcd').textContent=d;
  document.getElementById('iComp').textContent=d;
  document.getElementById('iType').textContent=d===1?'Knot':d+'-comp. link';
  document.getElementById('iLong').textContent=r;
  document.getElementById('iMerid').textContent=Math.abs(q);
  const cr=Math.abs(q)>0?Math.min(Math.abs(q)*(r-1),r*(Math.abs(q)-1)):0;
  document.getElementById('iCross').textContent=cr;
  rebuildSwatches(d);
}

function updateGhostOpacity(){
  const sOp=useGhost?(isLight?0.28:0.35):0;
  const wOp=useGhost?(isLight?0.22:0.20):0;
  [torusGrp,cylGrp].forEach(grp=>grp.children.forEach(ch=>{
    if(!ch.material||!ch.userData.ghostTag) return;
    ch.material.opacity=ch.userData.ghostTag===TAG_WIRE?wOp:sOp;
  }));
}

function rebuildSwatches(d){
  const g=document.getElementById('colorGrid'); g.innerHTML='';
  for(let c=0;c<d;c++){
    const sw=document.createElement('div'); sw.className='cs';
    const lbl=document.createElement('span'); lbl.textContent='C'+(c+1);
    const inp=document.createElement('input'); inp.type='color';
    inp.value=compColors[c]||PALETTE[c%PALETTE.length]; inp.dataset.idx=c;
    inp.addEventListener('input',e=>{compColors[+e.target.dataset.idx]=e.target.value;rebuildScene();applyView();});
    sw.appendChild(lbl); sw.appendChild(inp); g.appendChild(sw);
  }
}

// ─── view ─────────────────────────────────────────────────────
const VL={both:'TORUS + CYLINDER',torus:'TORUS VIEW',cyl:'CYLINDER VIEW',link:'LINK ONLY'};
function setView(v){
  view=v;
  document.getElementById('vlabel').textContent=VL[v];
  ['vBoth','vTorus','vCyl','vLink'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById({both:'vBoth',torus:'vTorus',cyl:'vCyl',link:'vLink'}[v]).classList.add('on');
  applyView();
  afterViewChange();
}
function applyView(){
  updateGhostOpacity();
  if(view==='link') torusGrp.children.forEach(ch=>{if(ch.userData.ghostTag) ch.material.opacity=0;});
  if(view==='both'){
    torusGrp.visible=true; cylGrp.visible=true;
    torusGrp.position.set(-3.1,0,0); torusGrp.scale.setScalar(0.65);
    cylGrp.position.set(2.7,0,0);    cylGrp.scale.setScalar(0.65);
  } else if(view==='torus'||view==='link'){
    torusGrp.visible=true; cylGrp.visible=false;
    torusGrp.position.set(0,0,0); torusGrp.scale.setScalar(1);
  } else {
    torusGrp.visible=false; cylGrp.visible=true;
    cylGrp.position.set(0,0,0); cylGrp.scale.setScalar(1);
  }
}

// ─── INPUT: unified pointer/touch/mouse handling ───────────────
// Supports:
//   1-finger / mouse drag → rotate
//   2-finger pinch        → zoom
//   2-finger pan          → pan (shift+drag on mouse)
//   scroll wheel          → zoom

let rotX=0.28, rotY=0.45, panX=0, panY=0, zoom=8;

// Pointer state
const pointers = new Map(); // pointerId → {x,y}

function getWrap(){ return document.getElementById('wrap'); }

function onPointerDown(e){
  // Don't capture if sidebar open on mobile (let overlay handle it)
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  getWrap().setPointerCapture(e.pointerId);
}

function onPointerMove(e){
  if(!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  const curr = {x:e.clientX, y:e.clientY};
  const dx = curr.x - prev.x;
  const dy = curr.y - prev.y;

  if(pointers.size === 1){
    // single pointer → rotate (or shift+drag → pan for mouse)
    if(e.shiftKey){ panX+=dx*0.01; panY-=dy*0.01; }
    else { rotY+=dx*0.008; rotX+=dy*0.008; rotX=Math.max(-1.4,Math.min(1.4,rotX)); }
  } else if(pointers.size === 2){
    // two pointers — handle pinch + pan
    const ids = [...pointers.keys()];
    const other = pointers.get(ids[0]===e.pointerId ? ids[1] : ids[0]);

    const prevOther = other; // other pointer hasn't moved this frame
    // Mid-point movement → pan
    const midDx = dx * 0.5;
    const midDy = dy * 0.5;
    panX += midDx * 0.008;
    panY -= midDy * 0.008;

    // Distance change → zoom
    const prevDist = Math.hypot(prev.x - prevOther.x, prev.y - prevOther.y);
    const currDist = Math.hypot(curr.x - prevOther.x, curr.y - prevOther.y);
    const delta = currDist - prevDist;
    zoom -= delta * 0.03;
    zoom = Math.max(2, Math.min(25, zoom));
  }

  pointers.set(e.pointerId, curr);
}

function onPointerUp(e){
  pointers.delete(e.pointerId);
  try { getWrap().releasePointerCapture(e.pointerId); } catch(err){}
}

function onWheel(e){
  zoom += e.deltaY * 0.013;
  zoom = Math.max(2, Math.min(25, zoom));
}

const wrap = document.getElementById('wrap');
wrap.addEventListener('pointerdown', onPointerDown);
wrap.addEventListener('pointermove', onPointerMove);
wrap.addEventListener('pointerup',   onPointerUp);
wrap.addEventListener('pointercancel', onPointerUp);
wrap.addEventListener('wheel', onWheel, {passive:true});
// Prevent context menu on long-press
wrap.addEventListener('contextmenu', e => e.preventDefault());

// ─── controls wiring ──────────────────────────────────────────
// Unified setters keep slider, label, and number input in sync.
// Slider thumb clamps to its range visually; number input has no limit.
function setQ(val) {
  const v = parseInt(val);
  if (isNaN(v)) return;
  Q = v;
  document.getElementById('qVal').textContent = v;
  // clamp slider thumb into its range without clamping the actual value
  const sl = document.getElementById('qSl');
  sl.value = Math.max(parseInt(sl.min), Math.min(parseInt(sl.max), v));
  document.getElementById('qNum').value = v;
  document.getElementById('qNum').classList.remove('invalid');
  rebuildScene(); applyView();
}
function setR(val) {
  const v = parseInt(val);
  if (isNaN(v) || v < 1) {
    document.getElementById('rNum').classList.add('invalid');
    return;
  }
  R = v;
  document.getElementById('rVal').textContent = v;
  const sl = document.getElementById('rSl');
  sl.value = Math.max(parseInt(sl.min), Math.min(parseInt(sl.max), v));
  document.getElementById('rNum').value = v;
  document.getElementById('rNum').classList.remove('invalid');
  rebuildScene(); applyView();
}

document.getElementById('qSl').addEventListener('input', e => setQ(e.target.value));
document.getElementById('rSl').addEventListener('input', e => setR(e.target.value));

// Number inputs: update on Enter or blur
function wireNumInput(id, setter) {
  const el = document.getElementById(id);
  el.addEventListener('keydown', e => { if (e.key === 'Enter') { setter(el.value); el.blur(); } });
  el.addEventListener('blur',    () => setter(el.value));
  // live update while typing if value looks complete (non-empty, valid integer)
  el.addEventListener('input',   () => {
    const v = parseInt(el.value);
    if (!isNaN(v) && el.value.trim() !== '' && el.value.trim() !== '-') setter(el.value);
  });
}
wireNumInput('qNum', setQ);
wireNumInput('rNum', setR);
document.getElementById('chkTube').addEventListener('change',e=>{useTube=e.target.checked;rebuildScene();applyView();});
document.getElementById('chkGhost').addEventListener('change',e=>{useGhost=e.target.checked;updateGhostOpacity();});
document.getElementById('chkDots').addEventListener('change',e=>{useDots=e.target.checked;rebuildScene();applyView();});
document.getElementById('speedSl').addEventListener('input',e=>{speed=parseFloat(e.target.value);document.getElementById('spVal').textContent=speed.toFixed(1)+'×';});
function togglePlay(){playing=!playing;document.getElementById('playBtn').textContent=playing?'⏸':'▶';}

// ─── resize ───────────────────────────────────────────────────
function resize(){
  const w=wrap.clientWidth, h=wrap.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize',()=>{resize();});
// Also resize after sidebar transition
sidebar.addEventListener('transitionend', resize);
resize();

// ─── render loop ──────────────────────────────────────────────
let t=0;
function animate(){
  requestAnimationFrame(animate);
  if(playing) t+=0.003*speed;
  const ry=rotY+(playing?t:0);
  torusGrp.rotation.set(rotX,ry,0);
  cylGrp.rotation.set(rotX,ry,0);
  camera.position.set(panX,panY,zoom);
  camera.lookAt(panX,panY,0);
  ptL.intensity=0.55+0.18*Math.sin(t*1.4);
  renderer.render(scene,camera);
}

// ─── init ─────────────────────────────────────────────────────
rebuildScene();
setView('torus');
animate();
</script>
</body>
